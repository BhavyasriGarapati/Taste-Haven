{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taste Haven | Admin Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'restaurant/css/style.css' %}">
    <style>
        body {
            background: linear-gradient(rgba(20, 10, 5, 0.9), rgba(20, 10, 5, 0.95)), 
                        url('https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            background-color: rgba(28, 18, 12, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--color-gold);
            padding: 50px 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }
        .login-logo {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 1px;
            color: #fff;
        }
        .login-logo-gold {
            color: var(--color-gold);
        }
        .login-title {
            font-size: 1.25rem;
            color: var(--color-text-muted);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .form-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }
        .form-group i {
            position: absolute;
            left: 15px;
            top: 42px;
            color: var(--color-gold);
        }
        .form-group input {
            padding-left: 45px;
        }
        .btn-login {
            background-color: var(--color-gold);
            color: #121212;
            font-weight: 700;
            margin-top: 15px;
            width: 100%;
        }
        .btn-login:hover {
            background-color: var(--color-gold-hover);
            transform: translateY(-2px);
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--color-text-muted);
            transition: var(--transition-smooth);
        }
        .back-link:hover {
            color: var(--color-gold);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <a href="{% url 'home' %}" class="login-logo">
            <span class="login-logo-gold">Taste</span> Haven
        </a>
        <h2 class="login-title">Admin Access Portal</h2>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-error" style="margin-bottom: 20px; font-size: 0.9rem; padding: 10px 15px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="POST" action="{% url 'admin_login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="id_username">Username</label>
                <i class="fa-solid fa-user"></i>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label class="form-label" for="id_password">Password</label>
                <i class="fa-solid fa-lock"></i>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-login">Verify Credentials</button>
        </form>
        
        <a href="{% url 'home' %}" class="back-link"><i class="fa-solid fa-arrow-left"></i> Return to Homepage</a>
    </div>
</body>
</html>
